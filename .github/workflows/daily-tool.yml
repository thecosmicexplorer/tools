name: Daily Security Tool

on:
  schedule:
    - cron: '0 4 * * *'    # 8:00 AM UAE (UTC+4) daily
  workflow_dispatch:         # manual trigger via GitHub UI

permissions:
  contents: write

jobs:
  generate-tool:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai httpx

      - name: Generate and publish tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_tool.py
