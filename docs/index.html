<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Security Tools — thecosmicexplorer</title>
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --green:    #3fb950;
    --green-dim:#1a4721;
    --red:      #f85149;
    --red-dim:  #4d1f1c;
    --yellow:   #d29922;
    --yellow-dim:#3d2e0a;
    --blue:     #58a6ff;
    --blue-dim: #1c3a5e;
    --purple:   #bc8cff;
    --purple-dim:#2d1f4e;
    --orange:   #e3b341;
    --orange-dim:#3d2e0a;
    --teal:     #39d353;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; min-height: 100vh; }

  /* Header */
  header { border-bottom: 1px solid var(--border); padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-icon { width: 36px; height: 36px; background: var(--green-dim); border: 1px solid var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  .logo-text p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-actions { display: flex; gap: 10px; }
  .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: border-color .15s, background .15s; }
  .btn:hover { border-color: var(--blue); background: #1c3a5e33; }
  .btn-primary { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .btn-primary:hover { background: #2a5e32; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 32px; padding: 16px 32px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--green); font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

  /* Main */
  main { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }

  /* Search */
  .search-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 240px; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  #search { width: 100%; padding: 10px 12px 10px 38px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; outline: none; transition: border-color .15s; }
  #search:focus { border-color: var(--blue); }
  #search::placeholder { color: var(--muted); }

  /* Filters */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active { color: #fff; font-weight: 600; }
  .filter-btn[data-cat="all"].active       { background: #21262d; border-color: var(--text); color: var(--text); }
  .filter-btn[data-cat="rce"].active       { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .filter-btn[data-cat="ssrf"].active      { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }
  .filter-btn[data-cat="auth-bypass"].active  { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
  .filter-btn[data-cat="path-traversal"].active { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }
  .filter-btn[data-cat="info-leak"].active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
  .filter-btn[data-cat="phishing"].active  { background: #2e1065; border-color: #a855f7; color: #a855f7; }
  .filter-btn[data-cat="misc"].active      { background: #1c2332; border-color: var(--muted); color: var(--muted); }

  /* Result count */
  .result-count { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .result-count span { color: var(--text); font-weight: 600; }

  /* Table */
  .table-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--surface); }
  th { padding: 10px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #161b2280; }
  .tool-name { font-family: 'SF Mono', 'Fira Code', monospace; color: var(--blue); text-decoration: none; font-size: 13px; }
  .tool-name:hover { text-decoration: underline; }
  .desc { color: var(--muted); max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .date-cell { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .cve-badge { font-family: monospace; font-size: 11px; padding: 2px 7px; border-radius: 4px; background: #21262d; border: 1px solid var(--border); white-space: nowrap; }
  .cvss-high { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .cvss-med  { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }

  /* Category badges */
  .cat-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; border: 1px solid; }
  .cat-rce            { background: var(--red-dim);    border-color: var(--red);    color: var(--red); }
  .cat-ssrf           { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }
  .cat-auth-bypass    { background: var(--blue-dim);   border-color: var(--blue);   color: var(--blue); }
  .cat-path-traversal { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }
  .cat-info-leak      { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
  .cat-phishing       { background: #2e1065; border-color: #a855f7; color: #a855f7; }
  .cat-misc           { background: #1c2332; border-color: var(--muted); color: var(--muted); }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }

  /* Footer */
  footer { border-top: 1px solid var(--border); padding: 20px 32px; text-align: center; font-size: 12px; color: var(--muted); margin-top: 40px; }
  footer a { color: var(--blue); text-decoration: none; }

  @media (max-width: 700px) {
    header, .stats-bar, main { padding: 16px; }
    .desc, th:nth-child(5), td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="https://github.com/thecosmicexplorer/tools">
    <div class="logo-icon">🛡️</div>
    <div class="logo-text">
      <h1>Daily Security Tools</h1>
      <p>thecosmicexplorer · One new scanner every day</p>
    </div>
  </a>
  <div class="header-actions">
    <a class="btn" href="https://github.com/thecosmicexplorer/tools/issues/new/choose">Request a Tool</a>
    <a class="btn btn-primary" href="https://github.com/thecosmicexplorer/tools">★ Star on GitHub</a>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-value" id="stat-total">—</span><span class="stat-label">Total Tools</span></div>
  <div class="stat"><span class="stat-value" id="stat-rce">—</span><span class="stat-label">RCE</span></div>
  <div class="stat"><span class="stat-value" id="stat-ssrf">—</span><span class="stat-label">SSRF</span></div>
  <div class="stat"><span class="stat-value" id="stat-auth">—</span><span class="stat-label">Auth Bypass</span></div>
  <div class="stat"><span class="stat-value" id="stat-pt">—</span><span class="stat-label">Path Traversal</span></div>
  <div class="stat"><span class="stat-value" id="stat-streak">—</span><span class="stat-label">Day Streak</span></div>
</div>

<main>
  <div class="search-row">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/></svg>
      <input id="search" type="text" placeholder="Search by tool name, CVE, target…" autocomplete="off">
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="rce">🔴 RCE</button>
    <button class="filter-btn" data-cat="ssrf">🟡 SSRF</button>
    <button class="filter-btn" data-cat="auth-bypass">🔵 Auth Bypass</button>
    <button class="filter-btn" data-cat="path-traversal">🟣 Path Traversal</button>
    <button class="filter-btn" data-cat="info-leak">🟠 Info Leak</button>
    <button class="filter-btn" data-cat="phishing">🟤 Phishing</button>
    <button class="filter-btn" data-cat="misc">⚪ Misc</button>
  </div>

  <div class="result-count" id="result-count"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Tool</th>
          <th>Category</th>
          <th>CVE</th>
          <th>Date</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<footer>
  Built by <a href="https://github.com/thecosmicexplorer">@thecosmicexplorer</a> ·
  <a href="https://github.com/thecosmicexplorer/tools">GitHub</a> ·
  <a href="https://github.com/thecosmicexplorer/tools/issues/new/choose">Request a tool</a>
</footer>

<script>
const BASE = "https://raw.githubusercontent.com/thecosmicexplorer/tools/main/";
const GH   = "https://github.com/thecosmicexplorer/tools/blob/main/";

const CAT_LABEL = {
  "rce": "RCE", "ssrf": "SSRF", "auth-bypass": "Auth Bypass",
  "path-traversal": "Path Traversal", "info-leak": "Info Leak",
  "phishing": "Phishing", "misc": "Misc"
};

let allTools = [];
let activeFilter = "all";

async function load() {
  const res = await fetch(BASE + "tools.json?t=" + Date.now());
  allTools = await res.json();
  updateStats();
  render();
}

function updateStats() {
  document.getElementById("stat-total").textContent = allTools.length;
  document.getElementById("stat-rce").textContent   = allTools.filter(t => t.category === "rce").length;
  document.getElementById("stat-ssrf").textContent  = allTools.filter(t => t.category === "ssrf").length;
  document.getElementById("stat-auth").textContent  = allTools.filter(t => t.category === "auth-bypass").length;
  document.getElementById("stat-pt").textContent    = allTools.filter(t => t.category === "path-traversal").length;

  // Calculate streak (consecutive days with tools)
  const dates = [...new Set(allTools.map(t => t.date).filter(Boolean))].sort().reverse();
  let streak = 0;
  const today = new Date().toISOString().slice(0,10);
  let cur = today;
  for (const d of dates) {
    if (d === cur) { streak++; const dt = new Date(cur); dt.setDate(dt.getDate()-1); cur = dt.toISOString().slice(0,10); }
    else if (d < cur) break;
  }
  document.getElementById("stat-streak").textContent = streak + (streak === 1 ? " day" : " days");
}

function render() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const filtered = allTools.filter(t => {
    const catOk = activeFilter === "all" || t.category === activeFilter;
    if (!catOk) return false;
    if (!q) return true;
    return t.name.includes(q) || (t.cve||"").toLowerCase().includes(q) ||
           t.description.toLowerCase().includes(q) ||
           (t.targets||[]).some(tg => tg.includes(q)) ||
           t.category.includes(q);
  });

  const count = document.getElementById("result-count");
  count.innerHTML = `Showing <span>${filtered.length}</span> of <span>${allTools.length}</span> tools`;

  const tbody = document.getElementById("tbody");
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><h3>No tools found</h3><p>Try a different search or filter</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(t => {
    const cveClass = t.cvss >= 9 ? "cve-badge cvss-high" : t.cvss >= 7 ? "cve-badge cvss-med" : "cve-badge";
    const cveText  = t.cve ? (t.cvss ? `${t.cve} · ${t.cvss}` : t.cve) : "—";
    const catClass = "cat-badge cat-" + t.category;
    const catLabel = CAT_LABEL[t.category] || t.category;
    const dateStr  = t.date || "—";
    const desc     = escHtml(t.description || "");
    const href     = GH + t.path;
    return `<tr>
      <td><a class="tool-name" href="${href}" target="_blank">${escHtml(t.filename)}</a></td>
      <td><span class="${catClass}">${catLabel}</span></td>
      <td><span class="${t.cve ? cveClass : ''}">${t.cve ? escHtml(cveText) : '<span style="color:var(--muted)">—</span>'}</span></td>
      <td class="date-cell">${dateStr}</td>
      <td class="desc" title="${desc}">${desc}</td>
    </tr>`;
  }).join("");
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Search
document.getElementById("search").addEventListener("input", render);

// Filters
document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeFilter = btn.dataset.cat;
  render();
});

load().catch(err => {
  document.getElementById("tbody").innerHTML =
    `<tr><td colspan="5"><div class="empty"><h3>Could not load tools</h3><p>${err.message}</p></div></td></tr>`;
});
</script>
</body>
</html>
